services:
  # Production deployment with external PostgreSQL
  brezel-api:
    image: ${DOCKER_IMAGE}:${DOCKER_IMAGE_TAG:-latest}
    environment:
      - DSN=${DSN}
      - DATA_FOLDER=${DATA_FOLDER:-/gmapsdata}
      - WEB_ADDR=${WEB_ADDR:-:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_OUTPUT=${LOG_OUTPUT:-stdout}
      - CONCURRENCY=${CONCURRENCY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - APP_ENV=production
      - DISABLE_TELEMETRY=${DISABLE_TELEMETRY:-0}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - gmapsdata:/gmapsdata
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "3"
        loki-external-labels: "environment=production,service=backend"
        max-size: "100m"
        max-file: "3"

  # Optional: nginx reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - brezel-api
    restart: unless-stopped
    profiles:
      - with-proxy

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  gmapsdata:
  loki-data:
  grafana-data:

    # Environment variables needed:
    # DSN=postgres://username:password@host:5432/database?sslmode=disable
    # LOG_LEVEL=info
    # API_PORT=8080
    # NGINX_PORT=80
    # NGINX_SSL_PORT=443
    # DISABLE_TELEMETRY=0
    # CLERK_SECRET_KEY=your_clerk_secret_key
    # GRAFANA_ADMIN_USER=admin
    # GRAFANA_ADMIN_PASSWORD=your_secure_password
    #
