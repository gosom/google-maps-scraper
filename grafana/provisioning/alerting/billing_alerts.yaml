# Grafana alerting provisioning — billing subsystem
#
# Loaded at Grafana startup from /etc/grafana/provisioning/alerting/.
# Requires Grafana 11.x (unified alerting).
#
# Required env vars (set in docker-compose):
#   OPS_ALERT_EMAIL   — comma-separated recipient list for ops billing alerts
#
# Alert threshold:
#   The alert fires when refund_cap_applied log entries exceed 5 in any 24 h window.
#   To change the threshold, update the `params` value in the condition below and
#   redeploy (or override via the Grafana UI — provisioned rules are editable unless
#   you set allowUIUpdates: false).
#
# Noise suppression:
#   A single isolated event does NOT fire the alert — the rule uses a "greater than"
#   condition with a minimum count of 5, and the evaluation interval is 1 h.
#   This means a burst of 5+ events within any 24 h rolling window is required.

apiVersion: 1

# ---------------------------------------------------------------------------
# Contact points
# ---------------------------------------------------------------------------
contactPoints:
  - orgId: 1
    name: ops-billing-email
    receivers:
      - uid: ops-billing-email-recv
        type: email
        settings:
          addresses: ${OPS_ALERT_EMAIL}
          subject: "[ALERT] refund_cap_applied spike — {{ len .Alerts.Firing }} events in 24h"
          message: |
            The refund credit cap has fired {{ len .Alerts.Firing }} times in the last 24 hours.

            This means multiple users retained credits they should not have. Ops action may be required.

            Runbook:
              1. Query credit_transactions WHERE type='refund' ORDER BY created_at DESC LIMIT 50
              2. Cross-reference stripe_payments WHERE status='refund_partial_cap'
              3. Decide whether to manually reconcile (deduct credits, issue statement credit, or accept)
              4. If one user triggers most events, investigate Stripe retry storms or abuse

            Grafana dashboard: http://localhost:3001
        disableResolveMessage: false

# ---------------------------------------------------------------------------
# Notification policies
# ---------------------------------------------------------------------------
policies:
  - orgId: 1
    receiver: ops-billing-email
    group_by:
      - alertname
    routes:
      - receiver: ops-billing-email
        matchers:
          - team = ops
          - domain = billing
        group_wait: 5m
        group_interval: 30m
        repeat_interval: 24h

# ---------------------------------------------------------------------------
# Alert rule groups
# ---------------------------------------------------------------------------
groups:
  - orgId: 1
    name: billing-alerts
    folder: Billing
    interval: 1h
    rules:
      - uid: billing-refund-cap-threshold
        title: "refund_cap_applied count exceeds threshold (24h)"
        condition: threshold
        data:
          # Step A — fetch log count from Loki over the last 24 h
          - refId: log_count
            queryType: range
            relativeTimeRange:
              from: 86400  # 24 h in seconds
              to: 0
            datasourceUid: brezel-loki
            model:
              expr: 'sum(count_over_time({service="backend"} |= "refund_cap_applied" [24h]))'
              instant: true
              range: false
              legendFormat: "refund_cap_applied count"
          # Step B — reduce to a single scalar
          - refId: reduce
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: log_count
              reducer: last
              settings:
                mode: dropNN
          # Step C — threshold condition (fires when count > 5)
          - refId: threshold
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: reduce
              conditions:
                - evaluator:
                    type: gt
                    # Default threshold: 5 events in 24 h.
                    # Override by editing this value and redeploying.
                    params: [5]
        noDataState: NoData
        execErrState: Error
        # Wait 0 s after condition becomes true before firing — already noise-suppressed
        # by the threshold count (>5 required, so single events are ignored).
        for: 0s
        annotations:
          summary: "refund_cap_applied fired more than 5 times in 24 h"
          description: >
            The billing service capped credit deductions on {{ $value }} refund events
            in the last 24 hours. Users affected may have retained free credits.
            Follow the runbook in pkg/metrics/billing.go to investigate.
          runbook_url: "https://github.com/gosom/google-maps-scraper/blob/main/pkg/metrics/billing.go"
        labels:
          severity: warning
          team: ops
          domain: billing
        isPaused: false
        notificationSettings:
          receiver: ops-billing-email
